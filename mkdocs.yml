site_name: Conditional Expressions Extended
site_description: Skyrim SE mod - dynamic facial animations and expressions driven by game conditions and emotions.
site_url: https://crajjjj.github.io/ConditionalExpressionsExtended/
repo_name: crajjjj/ConditionalExpressionsExtended
repo_url: https://github.com/crajjjj/ConditionalExpressionsExtended
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - For Players:
    - Getting Started: players/getting-started.md
    - Requirements & Compatibility: players/compatibility.md
    - Expressions & Conditions: players/expressions.md
    - MCM Reference: players/mcm-reference.md
    - Console Commands: players/console-commands.md
    - Troubleshooting & FAQ: players/troubleshooting.md
  - For Mod Authors:
    - Overview: authors/overview.md
    - Custom Expression JSON: authors/expression-json.md
    - Mod Events API: authors/modevents.md
    - Building from Source: authors/building.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

validation:
  links:
    not_found: warn
    anchors: warn

plugins:
  - search
